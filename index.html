<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BASE RUNNER</title>
  <meta name="description"
    content="Base Chain Defender — A Farcaster Mini App game. Defeat Gas Goblins, Rug Bots and Bridge Trolls!" />
  <meta name="fc:miniapp"
    content='{"version":"1","imageUrl":"https://base-runner.netlify.app/preview.png","button":{"title":"🎮 Play BASE RUNNER","action":{"type":"launch_frame","name":"BASE RUNNER","url":"https://base-runner.netlify.app","splashImageUrl":"https://base-runner.netlify.app/icon.png","splashBackgroundColor":"#020912"}}}' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #020912;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none
    }

    #app {
      position: relative;
      width: 424px;
      height: 695px;
      overflow: hidden;
      border: 1px solid #0052FF33;
      box-shadow: 0 0 60px #0052FF22, 0 0 120px #0052FF0A
    }

    canvas {
      display: block;
      width: 424px;
      height: 695px
    }

    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 155px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 28px 28px;
      pointer-events: none;
      z-index: 10
    }

    .ctrl-btn {
      pointer-events: all;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 3px solid rgba(0, 82, 255, .55);
      background: rgba(0, 20, 60, .6);
      backdrop-filter: blur(6px);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .08s, transform .08s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 16px rgba(0, 82, 255, .3), inset 0 0 10px rgba(0, 82, 255, .1);
      position: relative
    }

    .ctrl-btn:active,
    .ctrl-btn.pressed {
      background: rgba(0, 82, 255, .45);
      border-color: rgba(0, 82, 255, .95);
      transform: scale(.91);
      box-shadow: 0 0 24px rgba(0, 82, 255, .65)
    }

    #btn-attack {
      border-color: rgba(245, 158, 11, .5);
      background: rgba(40, 20, 0, .7);
      color: #F59E0B;
      box-shadow: 0 0 16px rgba(245, 158, 11, .2)
    }

    #btn-attack:active,
    #btn-attack.pressed {
      background: rgba(245, 158, 11, .3);
      border-color: rgba(245, 158, 11, .95);
      box-shadow: 0 0 24px rgba(245, 158, 11, .55)
    }

    .lbl {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 6px;
      color: rgba(255, 255, 255, .35);
      white-space: nowrap
    }

    #share-btn {
      display: none;
      position: absolute;
      bottom: 172px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 22px;
      background: linear-gradient(135deg, #0052FF, #0038CC);
      border: 2px solid #60A5FA;
      border-radius: 8px;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      z-index: 20;
      pointer-events: all;
      box-shadow: 0 0 28px rgba(0, 82, 255, .55);
      white-space: nowrap
    }

    #share-btn:active {
      transform: translateX(-50%) scale(.96)
    }

    #add-btn {
      display: none;
      position: absolute;
      bottom: 240px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(0, 82, 255, .12);
      border: 1px solid rgba(0, 82, 255, .4);
      border-radius: 8px;
      color: rgba(255, 255, 255, .65);
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      cursor: pointer;
      z-index: 20;
      pointer-events: all;
      white-space: nowrap
    }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="canvas" width="424" height="695"></canvas>
    <div id="controls">
      <button class="ctrl-btn" id="btn-jump">▲<span class="lbl">JUMP</span></button>
      <button class="ctrl-btn" id="btn-attack">⚡<span class="lbl">ATTACK</span></button>
    </div>
    <button id="share-btn">🟦 SHARE ON FARCASTER</button>
    <button id="add-btn">➕ ADD MINI APP</button>
  </div>

  <script>
    'use strict';
    const W = 424, H = 695, GY = 490, GR = 0.55, JV = -13.5, SI = 2.8, SM = 6.5, SC = 0.0004, SPW = 130, SPM = 55;

    /* ── AUDIO ── */
    class SFX { constructor() { try { this.c = new (window.AudioContext || window.webkitAudioContext) } catch { this.c = null } } resume() { this.c?.state === 'suspended' && this.c.resume() } _p(f, t, d, v, s = null) { if (!this.c) return; const o = this.c.createOscillator(), g = this.c.createGain(); o.connect(g); g.connect(this.c.destination); o.type = t; o.frequency.value = f; if (s) o.frequency.exponentialRampToValueAtTime(s, this.c.currentTime + d); g.gain.setValueAtTime(v, this.c.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.c.currentTime + d); o.start(); o.stop(this.c.currentTime + d) } jump() { this._p(180, 'square', .15, .18, 420) } punch() { this._p(120, 'sawtooth', .08, .22, 60) } hurt() { this._p(90, 'square', .12, .28, 45) } coin() { this._p(550, 'sine', .1, .18, 700) } kill() { this._p(300, 'square', .12, .2, 180) } start() { [261, 330, 392, 523].forEach((f, i) => setTimeout(() => this._p(f, 'sine', .18, .18), i * 90)) } over() { [200, 160, 120, 80].forEach((f, i) => setTimeout(() => this._p(f, 'square', .15, .25), i * 100)) } }

    /* ── PLAYER ── */
    class Player { constructor() { this.x = 88; this.y = GY; this.vy = 0; this.w = 34; this.h = 50; this.onGnd = true; this.st = 'run'; this.atk = 0; this.hrt = 0; this.inv = 0; this.rc = 0; this.rt = 0 } jump(s) { if (!this.onGnd) return; this.vy = JV; this.onGnd = false; this.st = 'jump'; s.jump() } attack(s) { if (this.atk > 0) return; this.atk = 22; this.st = 'attack'; s.punch() } hurt(s) { if (this.inv > 0) return false; this.st = 'hurt'; this.hrt = 16; this.inv = 80; this.vy = -4; s.hurt(); return true } hb() { return { x: this.x, y: this.y - this.h, w: this.w, h: this.h } } pb() { if (this.st !== 'attack' || this.atk < 12) return null; return { x: this.x + this.w, y: this.y - this.h + 8, w: 48, h: this.h - 16 } } update() { if (!this.onGnd) { this.vy += GR; this.y += this.vy; if (this.y >= GY) { this.y = GY; this.vy = 0; this.onGnd = true; if (this.st !== 'attack') this.st = 'run' } } if (this.atk > 0 && --this.atk === 0 && this.st !== 'hurt') this.st = this.onGnd ? 'run' : 'jump'; if (this.hrt > 0 && --this.hrt === 0 && this.st === 'hurt') this.st = this.onGnd ? 'run' : 'jump'; if (this.inv > 0) this.inv--; if (++this.rt % 7 === 0) this.rc = (this.rc + 1) % 4 } draw(ctx) { if (this.inv > 0 && Math.floor(this.inv / 4) % 2 === 0) return; const { x, y, w, h, st, rc, atk } = this, cx = x + w / 2, ty = y - h; ctx.save(); ctx.fillStyle = 'rgba(0,82,255,.22)'; ctx.beginPath(); ctx.ellipse(cx, y + 3, 18, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#1E3A8A'; if (st === 'run') { const s = Math.sin(rc * Math.PI / 2) * 9; ctx.fillRect(cx - 13, y - 18, 11, 18 + s * .5); ctx.fillRect(cx + 2, y - 18, 11, 18 - s * .5) } else { ctx.fillRect(cx - 13, y - 20, 26, 20) } ctx.fillStyle = '#0052FF'; ctx.strokeStyle = '#003ACC'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(cx - 16, ty + 18, 32, 26, 4); ctx.fill(); ctx.stroke(); ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '8px serif'; ctx.textAlign = 'center'; ctx.fillText('Ⓑ', cx, ty + 36); ctx.fillStyle = '#FBBF24'; ctx.strokeStyle = '#D97706'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(cx - 11, ty, 22, 20, 4); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#1C1917'; ctx.fillRect(cx - 7, ty + 6, 4, 4); ctx.fillRect(cx + 3, ty + 6, 4, 4); ctx.fillStyle = '#1D4ED8'; ctx.beginPath(); ctx.moveTo(cx - 13, ty + 2); ctx.lineTo(cx + 13, ty + 2); ctx.lineTo(cx + 13, ty + 12); ctx.lineTo(cx - 13, ty + 12); ctx.closePath(); ctx.fill(); if (st === 'attack' && atk > 10) { const ext = (22 - atk) * 2.5, fx = cx + w * .4 + ext; ctx.fillStyle = '#FBBF24'; ctx.strokeStyle = '#D97706'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(fx, ty + 18, 18, 16, 4); ctx.fill(); ctx.stroke(); ctx.shadowColor = '#60A5FA'; ctx.shadowBlur = 14; ctx.strokeStyle = '#93C5FD'; ctx.lineWidth = 2; ctx.strokeRect(fx - 3, ty + 15, 24, 22); ctx.shadowBlur = 0 } ctx.restore() } }

    /* ── ENEMY ── */
    class Enemy { constructor(type, spd) { this.tp = type; this.x = W + 55; this.y = GY; this.w = type === 'goblin' ? 28 : type === 'bot' ? 36 : 54; this.h = type === 'goblin' ? 34 : type === 'bot' ? 46 : 62; this.hp = type === 'troll' ? 4 : type === 'bot' ? 2 : 1; this.mhp = this.hp; this.spd = spd * (type === 'goblin' ? 1.4 : type === 'troll' ? .65 : 1); this.dead = false; this.tk = 0; this.fr = 0; this.fl = 0; this.scd = type === 'bot' ? 80 : 9999; this.shot = false } hb() { return { x: this.x, y: this.y - this.h, w: this.w, h: this.h } } hit() { this.hp--; this.fl = 10; if (this.hp <= 0) { this.dead = true; return true } return false } update(ws) { this.x -= (this.spd + ws * .3); if (++this.tk % 10 === 0) this.fr = (this.fr + 1) % 4; if (this.fl > 0) this.fl--; if (--this.scd <= 0 && this.x < W - 30) { this.shot = true; this.scd = 100 } } draw(ctx) { const { x, y, w, h, tp, fr, fl } = this, cx = x + w / 2, ty = y - h; ctx.save(); ctx.filter = 'none'; ctx.fillStyle = 'rgba(200,0,0,.18)'; ctx.beginPath(); ctx.ellipse(cx, y + 3, w / 2, 5, 0, 0, Math.PI * 2); ctx.fill(); if (fl > 0) ctx.filter = 'brightness(4)'; if (tp === 'goblin') this._g(ctx, cx, ty, fr); else if (tp === 'bot') this._b(ctx, cx, ty, fr); else this._t(ctx, cx, ty, fr); ctx.filter = 'none'; if (this.mhp > 1) { ctx.fillStyle = '#1F2937'; ctx.fillRect(x, ty - 10, w, 5); ctx.fillStyle = this.hp / this.mhp > .5 ? '#22C55E' : '#EF4444'; ctx.fillRect(x, ty - 10, w * (this.hp / this.mhp), 5) } ctx.restore() } _g(ctx, cx, ty, fr) { const b = Math.sin(fr * Math.PI / 2) * 3; ctx.fillStyle = '#4ADE80'; ctx.strokeStyle = '#166534'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(cx - 14, ty + b, 28, 20, [8, 8, 4, 4]); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.roundRect(cx - 12, ty + 18 + b, 24, 16, 5); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#FEF08A'; ctx.fillRect(cx - 9, ty + 4 + b, 6, 7); ctx.fillRect(cx + 3, ty + 4 + b, 6, 7); ctx.fillStyle = '#14532D'; ctx.fillRect(cx - 7, ty + 6 + b, 3, 4); ctx.fillRect(cx + 5, ty + 6 + b, 3, 4); ctx.fillStyle = '#FDE047'; ctx.font = '5px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('GAS', cx, ty + 28 + b) } _b(ctx, cx, ty, fr) { const b = Math.sin(fr * Math.PI / 2) * 2; ctx.fillStyle = '#C084FC'; ctx.strokeStyle = '#6B21A8'; ctx.lineWidth = 2; ctx.fillRect(cx - 12, ty + b, 24, 18); ctx.strokeRect(cx - 12, ty + b, 24, 18); ctx.fillStyle = '#A855F7'; ctx.strokeStyle = '#6B21A8'; ctx.fillRect(cx - 16, ty + 18 + b, 32, 28); ctx.strokeRect(cx - 16, ty + 18 + b, 32, 28); ctx.fillStyle = '#EF4444'; ctx.fillRect(cx - 9, ty + 5 + b, 18, 6); ctx.fillStyle = '#A855F7'; ctx.fillRect(cx - 22, ty + 20 + b, 8, 14); ctx.fillRect(cx + 14, ty + 20 + b, 8, 14); ctx.strokeStyle = '#D8B4FE'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(cx - 5, ty + b); ctx.lineTo(cx - 5, ty - 8 + b); ctx.moveTo(cx + 5, ty + b); ctx.lineTo(cx + 5, ty - 8 + b); ctx.stroke(); ctx.fillStyle = '#F9A8D4'; ctx.font = '5px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('RUG', cx, ty + 34 + b) } _t(ctx, cx, ty, fr) { const b = Math.sin(fr * Math.PI / 2) * 2; ctx.fillStyle = '#F87171'; ctx.strokeStyle = '#991B1B'; ctx.lineWidth = 3; ctx.beginPath(); ctx.roundRect(cx - 20, ty + b, 40, 28, 8); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#EF4444'; ctx.strokeStyle = '#991B1B'; ctx.beginPath(); ctx.roundRect(cx - 24, ty + 26 + b, 48, 36, 6); ctx.fill(); ctx.stroke(); ctx.fillStyle = '#FEF08A'; ctx.fillRect(cx - 13, ty + 8 + b, 10, 9); ctx.fillRect(cx + 3, ty + 8 + b, 10, 9); ctx.fillStyle = '#1C1917'; ctx.fillRect(cx - 10, ty + 10 + b, 6, 6); ctx.fillRect(cx + 5, ty + 10 + b, 6, 6); ctx.strokeStyle = '#7F1D1D'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(cx - 14, ty + 6 + b); ctx.lineTo(cx - 3, ty + 11 + b); ctx.moveTo(cx + 3, ty + 11 + b); ctx.lineTo(cx + 14, ty + 6 + b); ctx.stroke(); ctx.fillStyle = '#EF4444'; ctx.fillRect(cx - 36, ty + 28 + b, 14, 22); ctx.fillRect(cx + 22, ty + 28 + b, 14, 22); ctx.fillStyle = '#FDE047'; ctx.font = '7px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('BOSS', cx, ty - 8) } }

    /* ── PROJECTILE ── */
    class Proj { constructor(x, y) { this.x = x; this.y = y; this.vx = -5; this.vy = -1.5; this.dead = false } update() { this.x += this.vx; this.vy += .12; this.y += this.vy; if (this.x < -20 || this.y > H + 20) this.dead = true } box() { return { x: this.x - 7, y: this.y - 7, w: 14, h: 14 } } draw(ctx) { ctx.save(); ctx.shadowColor = '#A855F7'; ctx.shadowBlur = 10; ctx.fillStyle = '#A855F7'; ctx.beginPath(); ctx.arc(this.x, this.y, 8, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#D8B4FE'; ctx.beginPath(); ctx.arc(this.x - 2, this.y - 2, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.restore() } }

    /* ── TOKEN ── */
    class Token { constructor(x, y, t) { this.x = x; this.y = y; this.t = t; this.r = 13; this.a = 0; this.ph = Math.random() * Math.PI * 2; this.col = false } update(ws) { this.x -= ws; this.a += .05; this.ph += .04 } dy() { return Math.sin(this.ph) * 6 } box() { const d = this.dy(); return { x: this.x - this.r, y: this.y - this.r + d, w: this.r * 2, h: this.r * 2 } } draw(ctx) { const { x, r, t, a } = this, y = this.y + this.dy(), c = t === 'eth' ? '#F59E0B' : '#0052FF', ic = t === 'eth' ? '#FDE047' : '#93C5FD'; ctx.save(); ctx.translate(x, y); ctx.rotate(a); ctx.shadowColor = c; ctx.shadowBlur = 14; ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = ic; ctx.beginPath(); ctx.arc(0, 0, r * .58, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = `${r * .85}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(t === 'eth' ? 'Ξ' : 'Ⓑ', 0, 1); ctx.restore() } }

    /* ── BURST PARTICLES ── */
    class Burst { constructor(x, y, c, n = 8) { this.pts = Array.from({ length: n }, () => ({ x, y, vx: (Math.random() - .5) * 9, vy: Math.random() * -7 - 1, r: 2 + Math.random() * 4, life: 1, c })) } update() { this.pts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .3; p.life -= .045 }); this.pts = this.pts.filter(p => p.life > 0) } done() { return this.pts.length === 0 } draw(ctx) { this.pts.forEach(p => { ctx.save(); ctx.globalAlpha = p.life; ctx.shadowColor = p.c; ctx.shadowBlur = 8; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill(); ctx.restore() }) } }

    /* ── SCORE POP ── */
    class Pop { constructor(x, y, txt, c = '#F59E0B') { this.x = x; this.y = y; this.txt = txt; this.c = c; this.life = 1.2 } update() { this.y -= 1.2; this.life -= .025 } done() { return this.life <= 0 } draw(ctx) { ctx.save(); ctx.globalAlpha = Math.min(this.life, 1); ctx.fillStyle = this.c; ctx.font = '9px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.shadowColor = this.c; ctx.shadowBlur = 10; ctx.fillText(this.txt, this.x, this.y); ctx.restore() } }

    /* ── BG NODE ── */
    class BgNode { constructor(init = false) { this.reset(init) } reset(init = false) { this.x = init ? Math.random() * W : W + 10; this.y = 40 + Math.random() * (GY - 100); this.r = 12 + Math.random() * 24; this.al = .04 + Math.random() * .08; this.sp = .25 + Math.random() * .9; this.ph = Math.random() * Math.PI * 2 } update() { this.x -= this.sp; this.ph += .018; if (this.x < -40) this.reset() } draw(ctx) { const a = this.al * (.65 + .35 * Math.sin(this.ph)); ctx.save(); ctx.strokeStyle = `rgba(0,82,255,${a * 4})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = `rgba(96,165,250,${a * 3})`; ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.restore() } }

    /* ── MAIN GAME ── */
    class Game {
      constructor() {
        this.cv = document.getElementById('canvas');
        this.cx = this.cv.getContext('2d');
        this.sfx = new SFX();
        this.st = 'menu';
        this.sc = 0; this.hi = +(localStorage.getItem('br_hi') || 0);
        this.lv = 3; this.co = 0; this.ct = 0; this.kl = 0; this.fr = 0;
        this.ws = SI; this.sp = 0; this.spi = SPW; this.tcd = 0; this.go = 0;
        this.pl = null; this.en = []; this.pr = []; this.tk = []; this.bu = []; this.po = [];
        this.bg = Array.from({ length: 20 }, (_, i) => new BgNode(i < 16));
        this.sdk = null;
        this._initSDK();
        this._bind();
        this._run();
      }

      async _initSDK() {
        try { const m = await import('https://esm.sh/@farcaster/miniapp-sdk@latest'); this.sdk = m.sdk; await this.sdk.actions.ready() } catch { }
        document.getElementById('share-btn').onclick = () => this._share();
        document.getElementById('add-btn').onclick = () => this.sdk?.actions?.addMiniApp?.().catch(() => { });
      }

      async _share() {
        const t = `🎮 BASE RUNNER — ${this.sc} puan!\n⛓️ ${this.kl} düşman yendim!\nFarcaster'da oyna 👇`;
        if (this.sdk) { try { await this.sdk.actions.composeCast({ text: t }); return } catch { } }
        window.open(`https://warpcast.com/~/compose?text=${encodeURIComponent(t)}`, '_blank');
      }

      _begin() {
        this.st = 'playing'; this.sc = 0; this.lv = 3; this.co = 0; this.ct = 0; this.kl = 0; this.fr = 0;
        this.ws = SI; this.sp = 0; this.spi = SPW; this.tcd = 0; this.go = 0;
        this.en = []; this.pr = []; this.tk = []; this.bu = []; this.po = [];
        this.pl = new Player();
        document.getElementById('share-btn').style.display = 'none';
        document.getElementById('add-btn').style.display = 'none';
        this.sfx.resume(); this.sfx.start();
      }

      _end() {
        this.st = 'gameover';
        if (this.sc > this.hi) { this.hi = this.sc; localStorage.setItem('br_hi', this.hi) }
        this.sfx.over();
        setTimeout(() => { document.getElementById('share-btn').style.display = 'block'; document.getElementById('add-btn').style.display = 'block' }, 1100);
      }

      _bind() {
        document.addEventListener('keydown', e => {
          if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) { e.preventDefault(); this._jump() }
          if (['KeyZ', 'KeyA', 'KeyX', 'ArrowRight'].includes(e.code)) { e.preventDefault(); this._atk() }
          if (e.code === 'Enter') this._start();
        });
        const j = document.getElementById('btn-jump'), a = document.getElementById('btn-attack');
        const btn = (el, fn) => { el.addEventListener('touchstart', e => { e.preventDefault(); fn(); el.classList.add('pressed') }, { passive: false }); el.addEventListener('touchend', () => el.classList.remove('pressed'), { passive: true }); el.addEventListener('mousedown', fn) };
        btn(j, () => this._jump()); btn(a, () => this._atk());
        this.cv.addEventListener('click', () => this._start());
        this.cv.addEventListener('touchstart', e => { e.preventDefault(); this._start() }, { passive: false });
      }
      _jump() { if (this.st === 'playing') this.pl?.jump(this.sfx); else this._begin() }
      _atk() { if (this.st === 'playing') this.pl?.attack(this.sfx) }
      _start() { if (this.st !== 'playing') this._begin() }

      _ov(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y }

      _update() {
        if (this.st !== 'playing') return;
        ++this.fr; this.go = (this.go + this.ws) % 60;
        this.ws = Math.min(SM, SI + this.fr * SC);
        this.spi = Math.max(SPM, SPW - this.fr * .035);
        if (this.fr % 60 === 0) this.sc += 3;
        if (this.ct > 0 && --this.ct === 0) this.co = 0;
        if (++this.sp >= this.spi) { this.sp = 0; this._spE() }
        if (++this.tcd >= 95) { this.tcd = 0; if (Math.random() < .75) this._spT() }
        this.pl.update();
        this.bg.forEach(n => n.update());
        this.en.forEach(e => { e.update(this.ws); if (e.shot) { this.pr.push(new Proj(e.x, e.y - e.h / 2)); e.shot = false } });
        this.en = this.en.filter(e => !e.dead && e.x > -80);
        this.pr.forEach(p => p.update()); this.pr = this.pr.filter(p => !p.dead);
        this.tk.forEach(t => t.update(this.ws)); this.tk = this.tk.filter(t => !t.col && t.x > -30);
        this.bu.forEach(b => b.update()); this.bu = this.bu.filter(b => !b.done());
        this.po.forEach(p => p.update()); this.po = this.po.filter(p => !p.done());
        this._col();
      }

      _spE() { const r = Math.random(), t = this.kl > 20 && r < .12 ? 'troll' : this.kl > 6 && r < .38 ? 'bot' : 'goblin'; this.en.push(new Enemy(t, this.ws * .38 + 1.6)) }
      _spT() { const t = Math.random() < .55 ? 'eth' : 'base', y = Math.random() < .45 ? GY - 13 : GY - 80 - Math.random() * 90; this.tk.push(new Token(W + 18, y, t)) }

      _col() {
        const { pl: p, en: e, pr: r, tk: k } = this, ph = p.hb(), pa = p.pb();
        for (const en of e) {
          if (en.dead) continue;
          const eh = en.hb();
          if (pa && this._ov(pa, eh)) {
            const d = en.hit();
            this.bu.push(new Burst(en.x + en.w / 2, en.y - en.h / 2, d ? '#F59E0B' : '#60A5FA', d ? 14 : 6));
            if (d) { const pts = en.tp === 'troll' ? 200 : en.tp === 'bot' ? 80 : 30; this.sc += pts; this.kl++; this.co++; this.ct = 130; this.sfx.kill(); this.po.push(new Pop(en.x + en.w / 2, en.y - en.h, `+${pts}`, '#F59E0B')) }
            else this.sfx.punch();
          }
          if (!en.dead && this._ov(ph, eh) && p.hurt(this.sfx) && --this.lv <= 0) this._end();
        }
        for (const pj of r) { if (pj.dead) continue; if (this._ov(ph, pj.box())) { pj.dead = true; this.bu.push(new Burst(pj.x, pj.y, '#A855F7', 6)); if (p.hurt(this.sfx) && --this.lv <= 0) this._end() } }
        for (const t of k) { if (t.col) continue; if (this._ov(ph, t.box())) { t.col = true; const pts = t.t === 'eth' ? 20 : 10; this.sc += pts; this.sfx.coin(); this.bu.push(new Burst(t.x, t.y, t.t === 'eth' ? '#F59E0B' : '#60A5FA', 8)); this.po.push(new Pop(t.x, t.y, `+${pts}`, t.t === 'eth' ? '#FBBF24' : '#60A5FA')) } }
      }

      _draw() {
        const ctx = this.cx;
        const bg = ctx.createLinearGradient(0, 0, 0, GY); bg.addColorStop(0, '#020912'); bg.addColorStop(1, '#061426');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#040D20'; ctx.fillRect(0, GY, W, H - GY);

        // BG connections
        ctx.save();
        const ns = this.bg;
        for (let i = 0; i < ns.length - 1; i++)for (let j = i + 1; j < ns.length; j++) { const d = Math.hypot(ns[i].x - ns[j].x, ns[i].y - ns[j].y); if (d < 110) { ctx.strokeStyle = `rgba(0,82,255,${(1 - d / 110) * .07})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(ns[i].x, ns[i].y); ctx.lineTo(ns[j].x, ns[j].y); ctx.stroke() } }
        ctx.restore();
        ns.forEach(n => n.draw(ctx));

        // Ground tiles
        ctx.save();
        const tw = 60, rows = Math.ceil(W / tw) + 2;
        for (let i = 0; i < rows; i++) { const tx = i * tw - this.go; ctx.fillStyle = '#0A1A40'; ctx.fillRect(tx, GY, tw, 30); ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 8; ctx.fillStyle = '#0052FF'; ctx.fillRect(tx, GY, tw, 3); ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(0,82,255,.3)'; ctx.lineWidth = 1; ctx.strokeRect(tx + 4, GY + 6, tw - 8, 18) }
        ctx.restore();

        this.tk.forEach(t => t.draw(ctx));
        this.en.forEach(e => e.draw(ctx));
        this.pr.forEach(p => p.draw(ctx));
        this.pl?.draw(ctx);
        this.bu.forEach(b => b.draw(ctx));
        this.po.forEach(p => p.draw(ctx));
        this._hud(ctx);
        if (this.st === 'menu') this._menu(ctx);
        if (this.st === 'gameover') this._gover(ctx);
      }

      _hud(ctx) {
        ctx.fillStyle = 'rgba(3,11,26,.88)'; ctx.fillRect(0, 0, W, 54);
        ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 8; ctx.fillStyle = '#0052FF'; ctx.fillRect(0, 52, W, 2); ctx.shadowBlur = 0;
        ctx.fillStyle = '#F59E0B'; ctx.font = '11px "Press Start 2P"'; ctx.textAlign = 'left'; ctx.fillText(`${this.sc}`, 14, 24);
        ctx.fillStyle = 'rgba(255,255,255,.32)'; ctx.font = '6px "Press Start 2P"'; ctx.fillText(`BEST ${this.hi}`, 14, 40);
        ctx.textAlign = 'right';
        for (let i = 0; i < 3; i++) { ctx.fillStyle = i < this.lv ? '#EF4444' : 'rgba(255,255,255,.15)'; ctx.font = '17px serif'; ctx.fillText('♥', W - 14 - i * 24, 30) }
        if (this.co >= 2) { ctx.fillStyle = '#FBBF24'; ctx.font = '8px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.shadowColor = '#F59E0B'; ctx.shadowBlur = 12; ctx.fillText(`x${this.co} COMBO!`, W / 2, 43); ctx.shadowBlur = 0 }
      }

      _menu(ctx) {
        ctx.fillStyle = 'rgba(2,9,18,.82)'; ctx.fillRect(0, 0, W, H);
        const cy = H / 2;
        ctx.save(); ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 40;
        ctx.fillStyle = '#0052FF'; ctx.font = '28px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('BASE', W / 2, cy - 100);
        ctx.fillStyle = '#FFFFFF'; ctx.font = '20px "Press Start 2P"'; ctx.fillText('RUNNER', W / 2, cy - 68);
        ctx.shadowBlur = 0; ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.font = '6px "Press Start 2P"'; ctx.textAlign = 'center';
        ctx.fillText('DEFEND THE BASE CHAIN!', W / 2, cy - 28);
        ctx.fillStyle = 'rgba(255,255,255,.2)'; ctx.fillText('Tap or press SPACE to start', W / 2, cy - 10);
        ctx.fillStyle = '#4ADE80'; ctx.fillText('⬡ GAS GOBLIN  +30', W / 2, cy + 22);
        ctx.fillStyle = '#C084FC'; ctx.fillText('⬡ RUG BOT  +80', W / 2, cy + 42);
        ctx.fillStyle = '#F87171'; ctx.fillText('⬡ BRIDGE TROLL  +200', W / 2, cy + 62);
        ctx.fillStyle = 'rgba(255,255,255,.22)'; ctx.fillText('⛓️ Collect ETH & BASE tokens', W / 2, cy + 88);
        if (Math.floor(Date.now() / 540) % 2 === 0) { ctx.fillStyle = '#0052FF'; ctx.font = '10px "Press Start 2P"'; ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 18; ctx.fillText('TAP TO START', W / 2, cy + 130); ctx.shadowBlur = 0 }
        ctx.fillStyle = 'rgba(255,255,255,.22)'; ctx.font = '6px "Press Start 2P"'; ctx.fillText('▲ JUMP    ⚡ ATTACK', W / 2, cy + 158);
      }

      _gover(ctx) {
        ctx.fillStyle = 'rgba(2,9,18,.86)'; ctx.fillRect(0, 0, W, H);
        const cy = H / 2;
        ctx.shadowColor = '#EF4444'; ctx.shadowBlur = 30; ctx.fillStyle = '#EF4444'; ctx.font = '18px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, cy - 120); ctx.shadowBlur = 0;
        ctx.fillStyle = '#F59E0B'; ctx.font = '12px "Press Start 2P"'; ctx.fillText(`SCORE: ${this.sc}`, W / 2, cy - 80);
        ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.font = '8px "Press Start 2P"'; ctx.fillText(`BEST: ${this.hi}`, W / 2, cy - 55);
        ctx.fillStyle = '#60A5FA'; ctx.font = '7px "Press Start 2P"'; ctx.fillText(`${this.kl} ENEMIES DEFEATED`, W / 2, cy - 30);
        if (Math.floor(Date.now() / 580) % 2 === 0) { ctx.fillStyle = '#fff'; ctx.font = '9px "Press Start 2P"'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10; ctx.fillText('TAP TO RETRY', W / 2, cy + 20); ctx.shadowBlur = 0 }
      }

      _run() { this._update(); this._draw(); requestAnimationFrame(() => this._run()) }
    }

    window.addEventListener('DOMContentLoaded', () => new Game());
  </script>
</body>
